services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalago
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5291:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Database=catalago;Username=postgres;Password=postgres"
      Jwt__Key: "CHANGE_THIS_TO_A_LONG_SECRET_KEY_MIN_32_CHARS!"
      Jwt__Issuer: CatalagoApi
      Jwt__Audience: CatalagoApi
      Supabase__Url: "${SUPABASE_URL:-}"
      Supabase__ServiceKey: "${SUPABASE_SERVICE_KEY:-}"
      Supabase__Bucket: "${SUPABASE_BUCKET:-Imagens-produtos}"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:80"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
